display_name: Backend System Workflow
short_description: Enforce backend boundaries, ORM/database access, test layering, state machines, idempotency, concurrency control, observability, migrations, and performance evidence.
default_prompt: Design, implement, or review this backend change using explicit boundaries, data model, GORM for Go relational persistence, ORM/query builder access for other stacks, repository boundaries, state machine, idempotency, concurrency control, permissions, API contract, observability, migrations, integration/component/system/e2e test layering, and performance validation.
