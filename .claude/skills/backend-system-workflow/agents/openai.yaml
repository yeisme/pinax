display_name: Backend System Workflow
short_description: Enforce backend boundaries, JSON service logging, stdout/stderr separation, rotating file diagnostics, call correlation, observability, tests, state machines, persistence, and operational readiness.
default_prompt: Design, implement, or review this backend change using explicit boundaries, data model, GORM for Go relational persistence, ORM/query builder access for other stacks, repository boundaries, state machine, idempotency, concurrency control, permissions, API contract, JSON service logging, stdout/stderr separation, rotating file diagnostics for local/dev services, call_id/request_id/trace_id correlation, redaction, observability, migrations, integration/component/system/e2e test layering, and performance validation.
