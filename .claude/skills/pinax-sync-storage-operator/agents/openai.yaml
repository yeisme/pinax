display_name: Pinax Sync And Storage Operator
short_description: Configure and operate Pinax storage, backend profiles, backend object diagnostics, sync daemon/logs/conflicts, and server/file/S3/rclone Cloud Sync without exposing credentials.
default_prompt: Inspect or configure Pinax sync/storage for this vault using profile names, remote names, or secret refs only; keep Remote API Mode separate from Cloud Sync and check daemon/conflict state before writes.
