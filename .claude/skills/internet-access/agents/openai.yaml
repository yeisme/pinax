display_name: Internet Information Access And Interaction
short_description: Guides agents to use Agent Reach, local CLIs, source priority, and local research infrastructure for internet lookup, platform access, verification, extraction, deep research, and browser interaction.
default_prompt: Complete this internet information access or interaction task. First classify the intent as local-research-infra, platform, lookup, research, deep-research, verify, extract, interact, or automate. If the task names Agent Reach, Twitter/X, Reddit, YouTube, Bilibili, XiaoHongShu, LinkedIn, V2EX, Xueqiu, Xiaoyuzhou, RSS, cookies, proxy, or platform backend routing, use the Agent Reach route: check agent-reach availability, run agent-reach doctor when possible, identify the active backend, and then call the selected upstream CLI directly. If the task is in a Yeisme/Hermes/OpenWebUI local deployment, reuse the local Firecrawl, SearXNG, and Research Harness constraints, and do not use BigModel/Zai web-search-prime as the default search backend. Then choose local CLIs by source, such as agent-reach, firecrawl, gh, package managers, curl, jq, agent-browser, browser-use, or npx playwright. Run real CLI commands directly; do not default to helper scripts. If the user asks for 50/100/200/300 examples or a systematic scan, use the deep_research route: define the query matrix, research budget, stopping conditions, candidate counts, dedupe rules, included samples, category statistics, and evidence matrix. Cite sources by evidence level and freshness requirements, and state fallback paths, limits, active backends, and confidence.
