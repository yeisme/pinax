display_name: Yeisme Frontend Design Router
short_description: Route Open Design, Taste, Impeccable, UI Spec, component sourcing, canvas UI, browser loop, and frontend quality tasks to the smallest non-conflicting skill chain.
default_prompt: Route this frontend design or UI task through Open Design first when available, choose one aesthetic direction layer, then select the implementation workflow, deterministic quality gate, and browser visual loop. If a named skill is unavailable, discover the closest equivalent and continue.
