display_name: Internet Information Access And Interaction
short_description: Guides agents to use local CLIs, source priority, and local research infrastructure for internet lookup, verification, extraction, Hermes/OpenWebUI research, deep research, and browser interaction.
default_prompt: Complete this internet information access or interaction task. First classify the intent as local-research-infra, lookup, research, deep-research, verify, extract, interact, or automate. If the task is in a Yeisme/Hermes/OpenWebUI local deployment, reuse the local Firecrawl, SearXNG, and Research Harness constraints, and do not use BigModel/Zai web-search-prime as the default search backend. Then choose local CLIs by source, such as firecrawl, gh, package managers, curl, jq, agent-browser, browser-use, or npx playwright. Run real CLI commands directly; do not default to helper scripts. If the user asks for 50/100/200/300 examples or a systematic scan, use the deep_research route: define the query matrix, research budget, stopping conditions, candidate counts, dedupe rules, included samples, category statistics, and evidence matrix. Cite sources by evidence level and freshness requirements, and state fallback paths, limits, and confidence.
