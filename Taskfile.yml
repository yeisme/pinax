version: "3"

tasks:
  default:
    desc: List available Pinax development tasks.
    cmds:
      - task --list

  deps:
    desc: Download Go module dependencies.
    cmds:
      - go mod download

  mod-check:
    desc: Verify go.mod and go.sum are tidy relative to the current worktree.
    cmds:
      - |
        tmp="$(mktemp -d)"
        trap 'rm -rf "$tmp"' EXIT
        cp go.mod go.sum "$tmp"/
        go mod tidy
        diff -u "$tmp/go.mod" go.mod
        diff -u "$tmp/go.sum" go.sum

  test:
    desc: Run Go tests.
    cmds:
      - go test ./...

  test:integration:
    desc: Run integration/e2e tests and write local evidence.
    cmds:
      - go run ./internal/testkit/integrationevidence

  build:
    desc: Build the Pinax CLI.
    deps: [fmt-check]
    cmds:
      - mkdir -p dist
      - go build -trimpath -ldflags="-s -w" -o dist/pinax ./cmd/pinax

  fmt:
    desc: Format Go files with golangci-lint formatters.
    cmds:
      - golangci-lint fmt

  fmt-check:
    desc: Verify Go files are formatted with golangci-lint formatters.
    cmds:
      - golangci-lint fmt --diff

  lint:
    desc: Run golangci-lint.
    cmds:
      - golangci-lint run

  run:
    desc: Run the Pinax CLI from source. Use ARGS="..." to pass command arguments.
    cmds:
      - go run ./cmd/pinax {{.ARGS}}

  tidy:
    desc: Tidy Go module files.
    cmds:
      - go mod tidy

  openspec:
    desc: Validate Pinax OpenSpec items.
    cmds:
      - openspec validate --all

  check:
    desc: Run the local Pinax quality gate.
    deps: [fmt-check, lint, test, build, openspec]

  ci:
    desc: Run the CI-equivalent Pinax quality gate.
    deps: [check]

  clean:
    desc: Remove local build artifacts.
    cmds:
      - rm -rf dist coverage.out

